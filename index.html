<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDC IPTV | Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --accent: #06b6d4;
            --accent-glow: 0 0 15px rgba(6, 182, 212, 0.6);
            --text-light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-light);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            box-shadow: var(--accent-glow);
            z-index: 100;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, #06b6d4, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* MAIN LAYOUT */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }

        /* PLAYER SECTION */
        .player-section {
            flex: 2;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }

        /* CUSTOM CONTROLS OVERLAY */
        .video-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .player-section:hover .video-overlay,
        .video-overlay.active {
            opacity: 1;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .control-btn:hover {
            background: var(--accent);
            box-shadow: var(--accent-glow);
            transform: scale(1.1);
        }

        .control-btn.play-btn {
            width: 65px;
            height: 65px;
            font-size: 26px;
            background: var(--accent);
        }

        /* LOADER */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* PLAYLIST SECTION */
        .playlist-section {
            flex: 1;
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        .search-filter-container {
            padding: 15px;
            background: rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
        }

        /* CHANNEL LIST */
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            align-content: start;
        }

        /* Custom Scrollbar */
        .channel-list::-webkit-scrollbar { width: 8px; }
        .channel-list::-webkit-scrollbar-track { background: transparent; }
        .channel-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .channel-list::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .channel {
            background: rgba(0,0,0,0.4);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 10px;
            height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .channel:hover {
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.3);
        }

        .channel img {
            max-width: 100%;
            max-height: 50px;
            object-fit: contain;
            margin-bottom: 5px;
        }

        .channel span {
            font-size: 11px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .channel.active {
            border-color: var(--accent);
            box-shadow: var(--accent-glow);
            background: rgba(6, 182, 212, 0.1);
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }
            .player-section {
                flex: none;
                height: 40vh; /* Fixed height for video on mobile */
            }
            .channel-list {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 500px) {
            .channel-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <h1>BDC IPTV</h1>
        <div class="time" id="clock">00:00:00</div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="main-container">
        
        <!-- VIDEO PLAYER -->
        <div class="player-section" id="player-container">
            <video id="video" autoplay playsinline></video>
            <div class="loader" id="loader"></div>
            
            <div class="video-overlay" id="controls">
                <button class="control-btn" onclick="prevChannel()" title="Previous"><i class="fas fa-backward-step"></i></button>
                <button class="control-btn play-btn" onclick="togglePlay()" id="playPauseBtn"><i class="fas fa-pause"></i></button>
                <button class="control-btn" onclick="nextChannel()" title="Next"><i class="fas fa-forward-step"></i></button>
                <button class="control-btn" onclick="togglePiP()" title="Picture in Picture"><i class="fas fa-compress"></i></button>
                <button class="control-btn" onclick="toggleFullScreen()" title="Fullscreen"><i class="fas fa-expand"></i></button>
            </div>
        </div>

        <!-- PLAYLIST -->
        <div class="playlist-section">
            <div class="search-filter-container">
                <input type="text" id="search" placeholder="🔍 Search Channels..." oninput="filterChannels()">
                <select id="categoryFilter" onchange="filterChannels()">
                    <option value="All">All Categories</option>
                </select>
            </div>
            
            <div class="channel-list" id="channelGrid">
                <!-- Channels will load here -->
            </div>
        </div>

    </div>

<script>
    // Configuration
    // Note: Use a raw link if importing directly from Github (e.g. raw.githubusercontent.com/...)
    const playlist = 'https://github.com/ahmhabib01/bdc_iptv/aynaott.m3u'; 
    
    let channels = [];
    let categories = new Set();
    let currentIndex = 0;
    let hls = null;

    const video = document.getElementById('video');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const loader = document.getElementById('loader');

    // Real-time Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // Fetch and Parse M3U
    async function loadPlaylist() {
        try {
            // Fallback URL if the raw one fails, you can change this back to your original link.
            const response = await fetch(playlist); 
            if(!response.ok) throw new Error("Network response was not ok");
            const data = await response.text();
            
            const lines = data.split('\n');
            let currentInfo = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF')) {
                    currentInfo = line;
                } else if (line.startsWith('http') && currentInfo) {
                    // Extract Logo
                    const logoMatch = currentInfo.match(/tvg-logo="(.*?)"/);
                    const logo = logoMatch ? logoMatch[1] : 'https://via.placeholder.com/100x50.png?text=NO+LOGO';
                    
                    // Extract Category
                    const groupMatch = currentInfo.match(/group-title="(.*?)"/);
                    const group = groupMatch ? groupMatch[1] : 'Uncategorized';
                    categories.add(group);

                    // Extract Name
                    const nameParts = currentInfo.split(',');
                    const name = nameParts.length > 1 ? nameParts[1].trim() : 'Unknown Channel';

                    channels.push({ name, url: line, logo, group, originalIndex: channels.length });
                    currentInfo = null;
                }
            }

            populateCategories();
            renderChannels(channels);
            if (channels.length > 0) playChannel(0);

        } catch (error) {
            console.error('Error loading playlist:', error);
            document.getElementById('channelGrid').innerHTML = `<p style="color:red; text-align:center; padding:20px;">Failed to load playlist. Please check the URL or CORS policy.</p>`;
        }
    }

    // Populate Categories Dropdown
    function populateCategories() {
        const select = document.getElementById('categoryFilter');
        Array.from(categories).sort().forEach(category => {
            const option = document.createElement('option');
            option.value = category;
            option.innerText = category;
            select.appendChild(option);
        });
    }

    // Render Channels into Grid
    function renderChannels(channelArray) {
        const grid = document.getElementById('channelGrid');
        grid.innerHTML = '';

        channelArray.forEach(ch => {
            const div = document.createElement('div');
            div.className = `channel ${ch.originalIndex === currentIndex ? 'active' : ''}`;
            div.id = `channel-${ch.originalIndex}`;
            div.onclick = () => playChannel(ch.originalIndex);
            
            div.innerHTML = `
                <img src="${ch.logo}" alt="${ch.name}" onerror="this.src='https://via.placeholder.com/100x50.png?text=TV'">
                <span>${ch.name}</span>
            `;
            grid.appendChild(div);
        });
    }

    // Filter by Search & Category
    function filterChannels() {
        const searchTerm = document.getElementById('search').value.toLowerCase();
        const categoryTerm = document.getElementById('categoryFilter').value;

        const filtered = channels.filter(ch => {
            const matchName = ch.name.toLowerCase().includes(searchTerm);
            const matchCat = categoryTerm === 'All' || ch.group === categoryTerm;
            return matchName && matchCat;
        });

        renderChannels(filtered);
    }

    // Play Video
    function playChannel(index) {
        if(index < 0 || index >= channels.length) return;
        currentIndex = index;
        const channel = channels[index];

        loader.style.display = 'block';

        // Update UI Active State
        document.querySelectorAll('.channel').forEach(el => el.classList.remove('active'));
        const activeCard = document.getElementById(`channel-${index}`);
        if(activeCard) {
            activeCard.classList.add('active');
            activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        if (hls) {
            hls.destroy();
        }

        if (Hls.isSupported() && channel.url.includes('.m3u8')) {
            hls = new Hls({ maxBufferLength: 30 });
            hls.loadSource(channel.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(e => console.log(e));
                loader.style.display = 'none';
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            });
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) loader.style.display = 'none';
            });
        } else {
            // For native support (Mobile/Safari) or MP4
            video.src = channel.url;
            video.play().catch(e => console.log(e));
            video.onloadeddata = () => loader.style.display = 'none';
        }
    }

    // Controls
    function togglePlay() {
        if (video.paused) {
            video.play();
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            video.pause();
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        }
    }

    function nextChannel() {
        let next = currentIndex + 1;
        if (next >= channels.length) next = 0;
        playChannel(next);
    }

    function prevChannel() {
        let prev = currentIndex - 1;
        if (prev < 0) prev = channels.length - 1;
        playChannel(prev);
    }

    // Advanced Features: Fullscreen & PiP
    function toggleFullScreen() {
        const playerContainer = document.getElementById('player-container');
        if (!document.fullscreenElement) {
            if (playerContainer.requestFullscreen) playerContainer.requestFullscreen();
            else if (playerContainer.webkitRequestFullscreen) playerContainer.webkitRequestFullscreen();
            else if (playerContainer.msRequestFullscreen) playerContainer.msRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    async function togglePiP() {
        if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
        } else if (document.pictureInPictureEnabled) {
            await video.requestPictureInPicture();
        } else {
            alert("Picture-in-Picture is not supported in your browser.");
        }
    }

    // Initialize
    window.onload = loadPlaylist;

</script>
</body>
</html>
